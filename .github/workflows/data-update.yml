name: Data Update Pipeline

on:
  schedule:
    # Run daily at 2:00 AM UTC (after market close, minimal API load)
    - cron: '0 2 * * *'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Number of stocks to check (default: 100)'
        required: false
        default: '100'
      force_update:
        description: 'Force update all stocks regardless of date'
        required: false
        default: 'false'

jobs:
  check-and-update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Need full history for potential rollbacks
        fetch-depth: 0
        # Use a token that can push to the repo
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Check and update data
      id: update_data
      run: |
        SAMPLE_SIZE="${{ github.event.inputs.sample_size || '100' }}"
        FORCE_UPDATE="${{ github.event.inputs.force_update || 'false' }}"
        python scripts/check_and_update_data.py --sample-size $SAMPLE_SIZE --force-update $FORCE_UPDATE
      env:
        DATA_LAG_DAYS: 31
        UPDATE_BUFFER_DAYS: 7

    - name: Check for changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/)" ]; then
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          echo "Changed files:"
          git status --porcelain data/
        else
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          echo "No data changes detected"
        fi

    - name: Commit and push changes
      if: steps.check_changes.outputs.changes_detected == 'true'
      run: |
        # Create a timestamp for the commit message
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        
        # Stage only parquet files in data directory
        git add data/
        
        # Create commit with detailed message
        git commit -m "📊 Data Update: $TIMESTAMP

        
        - Updated NSE stock data
        - SEBI compliant (31-day lag)
        - Automated daily check
        
        Workflow run: ${{ github.run_id }}"
        
        # Push changes
        git push

    - name: Generate update report
      if: always()
      run: |
        echo "# Data Update Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**SEBI Compliance:** 31-day lag enforced" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.check_changes.outputs.changes_detected }}" == "true" ]; then
          echo "✅ **Status:** Data updated successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Updated files:**" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD | grep -E '^data/.*\.parquet$' | head -20 | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
        else
          echo "⏭️ **Status:** No updates needed (data is fresh)" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload update log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: data-update-log-${{ github.run_id }}
        path: |
          data_update_report.json
          data_update_errors.log
        if-no-files-found: ignore

  notify:
    needs: check-and-update-data
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify on failure
      if: needs.check-and-update-data.result == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Data Update Pipeline Failed',
            body: `Data update workflow failed on ${new Date().toISOString()}
            
            Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            
            Please check the logs and investigate the issue.`,
            labels: ['bug', 'data-pipeline', 'automated']
          })